name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install package
        run: uv run --extra dev maturin develop --release

      - name: Import smoke
        run: uv run --extra dev python scripts/smoke_public_api.py

      - name: Python tests
        run: uv run --extra dev pytest

      - name: Lower-bound Polars smoke
        run: |
          uv pip install --reinstall "polars==1.29.0"
          uv run --no-sync python scripts/smoke_public_api.py

      - name: Rust and lint gates
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          uv run --extra dev ruff check .
